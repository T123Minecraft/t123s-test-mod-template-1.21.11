name: build

on: [pull_request, push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: read java version
        id: java
        run: |
          echo "version=$(grep '^java_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_OUTPUT

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: microsoft

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: find mod jar
        run: |
          JAR=$(find build/libs \
            -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-javadoc.jar" \
            | head -n 1)

          echo "JAR=$JAR" >> $GITHUB_ENV
          echo "JAR_NAME=$(basename "$JAR" .jar)" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.JAR_NAME }}
          path: ${{ env.JAR }}
          if-no-files-found: error
